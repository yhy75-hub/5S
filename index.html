<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>事務所 5Sチェックシート</title>
<style>
:root{--brand:#1d4ed8;--brand-l:#3b82f6;--ok:#16a34a;--ok-bg:#dcfce7;--warn:#b45309;--warn-bg:#fef3c7;--ng:#dc2626;--ng-bg:#fee2e2;--bg:#f1f5f9;--card:#fff;--border:#cbd5e1;--text:#0f172a;--muted:#64748b;--r:12px;--sh:0 2px 10px rgba(0,0,0,.09)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Hiragino Sans','Meiryo','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#app{max-width:960px;margin:0 auto;padding:12px}
.hd{background:linear-gradient(135deg,var(--brand),var(--brand-l));color:#fff;border-radius:var(--r);padding:16px 20px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--sh)}
.hd h1{font-size:1.25rem;font-weight:700}
.hd .sub{font-size:.8rem;opacity:.85;margin-top:2px}
.hd-r{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.badge{padding:3px 11px;border-radius:20px;font-size:.75rem;font-weight:700;background:rgba(255,255,255,.2)}
.badge.q{background:#dc2626}
.logout{background:rgba(255,255,255,.2);border:none;color:#fff;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:.8rem}
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:18px;margin-bottom:12px}
.card h2{font-size:1rem;margin-bottom:12px;color:var(--brand);border-bottom:2px solid var(--border);padding-bottom:7px}
.ngrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:8px;margin:10px 0}
.nbtn{padding:13px 6px;border:2px solid var(--border);border-radius:8px;background:var(--bg);cursor:pointer;font-size:.9rem;text-align:center;transition:all .15s;touch-action:manipulation}
.nbtn:active{transform:scale(.97)}
.nbtn.sel{border-color:var(--brand);background:#eff6ff;color:var(--brand);font-weight:700}
.nbtn.priv{border-color:var(--ng);color:var(--ng);background:#fff}
.nbtn.priv.sel{background:#fff1f2}
.pin-wrap{display:flex;gap:7px;align-items:center;margin-top:11px;flex-wrap:wrap}
.pin-wrap input{border:2px solid var(--border);border-radius:8px;padding:10px 13px;font-size:1rem;width:180px}
.pin-wrap input:focus{outline:none;border-color:var(--brand)}
.btn{padding:10px 18px;border:none;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:600;transition:all .15s;touch-action:manipulation}
.btn-p{background:var(--brand);color:#fff}.btn-p:active{background:#1e40af}
.btn-s{background:var(--ok);color:#fff}.btn-s:active{background:#15803d}
.btn-sm{padding:6px 13px;font-size:.82rem}
.btn:disabled{opacity:.5;cursor:not-allowed}
.al{padding:10px 14px;border-radius:8px;margin:9px 0;font-size:.86rem;line-height:1.4}
.al-i{background:#eff6ff;border-left:4px solid var(--brand);color:var(--brand)}
.al-s{background:var(--ok-bg);border-left:4px solid var(--ok);color:var(--ok)}
.al-d{background:var(--ng-bg);border-left:4px solid var(--ng);color:var(--ng)}
.nav{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap}
.nbtn2{padding:8px 15px;border:2px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;font-size:.87rem;transition:all .15s}
.nbtn2.on{border-color:var(--brand);background:var(--brand);color:#fff}
.qban{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff;padding:10px 16px;border-radius:8px;margin-bottom:12px;font-weight:600;font-size:.88rem}
.sec-ttl{background:var(--brand);color:#fff;padding:6px 13px;border-radius:6px;font-weight:700;margin:12px 0 7px;font-size:.88rem}
.area-lbl{font-size:.75rem;font-weight:700;color:var(--muted);padding:8px 0 3px;border-top:1px solid var(--border);margin-top:5px}
.area-lbl:first-of-type{border-top:none;margin-top:0}
.ci{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid #f1f5f9}
.ci:last-child{border-bottom:none}
.ci-no{flex-shrink:0;width:24px;height:24px;background:var(--bg);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.73rem;font-weight:700;color:var(--muted)}
.ci-txt{flex:1;font-size:.85rem;line-height:1.45;padding-top:3px}
.sg{display:flex;gap:5px;flex-shrink:0}
.sb{width:44px;height:38px;border:2px solid var(--border);border-radius:7px;cursor:pointer;font-weight:700;font-size:.9rem;background:#fff;transition:all .12s;touch-action:manipulation}
.sb:active{transform:scale(.94)}
.sb.ok{color:var(--ok)}.sb.ok.on{background:var(--ok);color:#fff;border-color:var(--ok)}
.sb.wr{color:var(--warn)}.sb.wr.on{background:#f59e0b;color:#fff;border-color:#f59e0b}
.sb.ng{color:var(--ng)}.sb.ng.on{background:var(--ng);color:#fff;border-color:var(--ng)}
.sb:disabled{opacity:.45;cursor:not-allowed}
.tbar{display:flex;justify-content:space-between;align-items:center;background:var(--bg);border-radius:8px;padding:10px 14px;margin:12px 0;font-weight:700}
.tscore{font-size:1.35rem;color:var(--brand)}
.mtabs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.mtab{padding:5px 11px;border:2px solid var(--border);border-radius:18px;cursor:pointer;font-size:.8rem;background:#fff;touch-action:manipulation}
.mtab.on{border-color:var(--brand);background:var(--brand);color:#fff}
.mtab.done{border-color:var(--ok);color:var(--ok)}
.mtab.done.on{background:var(--ok);color:#fff;border-color:var(--ok)}
.sv{text-align:center;padding:30px 14px}
.sv .ico{font-size:3rem;margin-bottom:12px}
.sv h2{color:var(--ok);font-size:1.35rem;margin-bottom:5px}
.sv p{color:var(--muted);margin-bottom:18px;font-size:.88rem}
.rtw{overflow-x:auto;-webkit-overflow-scrolling:touch}
.rt{width:100%;border-collapse:collapse;font-size:.75rem;min-width:680px}
.rt th{background:var(--brand);color:#fff;padding:6px 4px;text-align:center}
.rt th.ar{background:#1e3a8a}
.rt td{padding:5px 4px;text-align:center;border:1px solid var(--border)}
.rt .itl{text-align:left;padding-left:6px;max-width:170px;font-size:.73rem}
.rt .arc{background:#f8fafc;font-weight:700;font-size:.72rem;vertical-align:middle}
.c10{background:#bbf7d0;color:#15803d;font-weight:700}
.c5{background:#fef08a;color:#92400e;font-weight:700}
.c0{background:#fecaca;color:#991b1b;font-weight:700}
.cna{background:#f1f5f9;color:#94a3b8;font-size:.7rem}
.ct{background:var(--bg);font-weight:700}
.ct.hi{background:var(--ok-bg);color:var(--ok)}
.ct.md{background:var(--warn-bg);color:var(--warn)}
.ct.lo{background:var(--ng-bg);color:var(--ng)}
.loading{display:flex;flex-direction:column;align-items:center;padding:40px 20px;gap:14px;color:var(--muted)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){
  .ci{flex-direction:column;gap:7px}
  .sg{justify-content:flex-start}
  .ngrid{grid-template-columns:repeat(3,1fr)}
  .hd{flex-direction:column;gap:7px;align-items:flex-start}
  .sb{width:52px;height:44px;font-size:1rem}
}
</style>
</head>
<body>
<div id="app">
  <div class="loading"><div class="spinner"></div><span>読み込み中...</span></div>
</div>
<script>
// ================================================================
// ★ GAS WebアプリのURLをここに設定してください（直書き）
//    GASデプロイ後に発行される exec で終わるURLに変更すること
// ================================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwO08Gm39YHFUHM-8VXcdCFnEQwpd4yt5FWrPjwS2inlZQ5tsf_ao3XHCW5pvhN_wMC/exec';

// ================================================================
// チェック項目
// ================================================================
const S1 = [
  {a:'机の上', n:1,  t:'業務中や回覧中の物品以外は置かないこと。'},
  {a:'机の上', n:2,  t:'机上に書類・ファイル類が無造作に置いてない事（サイズ・角を揃えること）'},
  {a:'机の上', n:3,  t:'パソコンのディスプレイの周りにふせんなどを貼り付けないこと。'},
  {a:'机の上', n:4,  t:'上向きになっている空きコンセントにプラグをしてあること。'},
  {a:'机の上', n:5,  t:'上着をイスにかけない。（ロッカーへ片付ける）'},
  {a:'机の下', n:6,  t:'地震時に避難するスペース（身体が全部、入られる。）があること。'},
  {a:'机の下', n:7,  t:'机から離れるときは椅子をキチンと押し込むこと。'},
  {a:'床面',   n:8,  t:'業務中の物品は通路を遮らないように置いてあること。'},
  {a:'床面',   n:9,  t:'不急不要品がないこと。'},
  {a:'床面',   n:10, t:'物品を一時置きする場合は保管期限と担当者名を明記すること。'},
];
const S2 = [
  {a:'棚',                n:11, t:'棚の上に何も置かないこと。'},
  {a:'棚',                n:12, t:'高さ1.3m以下の書棚の上には決められたもの以外を置かないこと。'},
  {a:'棚',                n:13, t:'扉が閉まっていること。'},
  {a:'壁・柱',            n:14, t:'掲示期限のある掲示物には期日を記入すること。'},
  {a:'壁・柱',            n:15, t:'掲示期限が決めてないものは「期限なし」と明記すること。'},
  {a:'壁・柱',            n:16, t:'期限切れの掲示物がないこと。'},
  {a:'壁・柱',            n:17, t:'掲示物は平行・直角を原則として整然と配置すること。（汚れ・破損・はがれがないこと）'},
  {a:'その他(防火・防災)', n:18, t:'避難誘導灯の球切れがないこと。'},
  {a:'その他(防火・防災)', n:19, t:'消火器などの緊急機器の置き場表示が明確であること。'},
  {a:'その他(防火・防災)', n:20, t:'最終退出・火元・戸締り確認ルールが明確になっていること。'},
];
const MN = ['','1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

// ================================================================
// フロアマップ エリア定義（画像サイズ 1415x715 基準のpx座標）
// ================================================================
const AREAS = [
  // 個人エリア → S1合計スコアで塗り分け
  { key:'平林',  x:15,  y:5,   w:278, h:338 },
  { key:'森崎',  x:435, y:5,   w:128, h:180 },
  { key:'里見',  x:563, y:5,   w:110, h:180 },
  { key:'堀江',  x:673, y:5,   w:110, h:180 },
  { key:'細江',  x:783, y:5,   w:110, h:180 },
  { key:'林',    x:893, y:5,   w:110, h:90  },
  { key:'横塚',  x:563, y:185, w:110, h:143 },
  { key:'本城',  x:673, y:185, w:110, h:143 },
  { key:'山本',  x:783, y:185, w:110, h:143 },
  { key:'専務',  x:893, y:95,  w:90,  h:233 },
  { key:'四ツ木', x:563, y:328, w:110, h:130 },
  { key:'有側',  x:673, y:328, w:110, h:130 },
  { key:'毛利',  x:563, y:458, w:110, h:104 },
  { key:'松谷',  x:673, y:458, w:210, h:104 },
  { key:'伊藤',  x:883, y:328, w:192, h:234 },
  // 共通エリア → S2合計スコアで塗り分け（3エリア同スコア）
  { key:'林A',   x:15,  y:343, w:278, h:259, s2:true },
  { key:'伊藤A', x:298, y:283, w:137, h:220, s2:true },
  { key:'本城A', x:298, y:562, w:685, h:60,  s2:true },
];

function areaColor(score, alpha=0.6) {
  if (score == null) return `rgba(180,180,180,0.15)`;
  if (score >= 91)   return `rgba(0,176,80,${alpha})`;
  if (score >= 81)   return `rgba(146,208,80,${alpha})`;
  if (score >= 71)   return `rgba(255,255,0,${alpha})`;
  if (score >= 61)   return `rgba(197,90,17,${alpha})`;
  return                    `rgba(255,0,0,${alpha})`;
}

// ================================================================
// State
// ================================================================
const st = {
  view: 'login', user: null, role: null, selMember: null,
  y: new Date().getFullYear(), m: new Date().getMonth() + 1,
  cfg: null, memberData: {}, results: null,
  gasUrl: GAS_URL,
};
let _selPrivName = null;

const isQ  = () => st.cfg && st.cfg.qMonths.includes(st.m);
const sum  = arr => arr.reduce((a,b) => a + (b || 0), 0);
const scCls = s => s===10?'c10':s===5?'c5':s===0?'c0':'cna';
const totCls = t => t>=90?'ct hi':t>=70?'ct md':'ct lo';

// ================================================================
// API呼び出し
// ================================================================
async function apiGet(params) {
  const url = st.gasUrl + '?' + new URLSearchParams(params).toString();
  const res = await fetch(url, { redirect: 'follow', credentials: 'omit' });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

async function apiPost(body) {
  // GASはPOSTリダイレクトするためno-corsでは読めない場合があるためGETで統一
  // POST相当の操作もaction+パラメータをGETで送る（GASの仕様上の対応）
  const params = new URLSearchParams({ action: body.action });
  // ボディデータをBase64エンコードしてGETパラメータに載せる
  params.append('data', btoa(unescape(encodeURIComponent(JSON.stringify(body)))));
  const url = st.gasUrl + '?' + params.toString();
  const res = await fetch(url);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

// ================================================================
// 初期化
// ================================================================
async function init() {
  try {
    st.cfg = await apiGet({ action: 'getConfig' });
    st.selMember = st.cfg.members[0];
    render();
  } catch(e) {
    document.getElementById('app').innerHTML =
      `<div class="card"><div class="al al-d">読み込みに失敗しました。GAS URLまたはデプロイ設定を確認してください。<br><small>${e.message}</small></div></div>`;
  }
}

// ================================================================
// Render
// ================================================================
function render() {
  const q = isQ();
  const hd = `<div class="hd">
    <div>
      <h1>🏢 事務所 5Sチェックシート</h1>
      <div class="sub">${st.y}年 ${MN[st.m]}${q?' ／ 第三者評価月':''}</div>
    </div>
    <div class="hd-r">
      ${st.user ? `<span style="font-size:.85rem;opacity:.9">${st.user}</span>` : ''}
      <span class="badge ${q?'q':''}">${q?'第三者評価月':'通常評価月'}</span>
      ${st.user ? `<button class="logout" onclick="logout()">ログアウト</button>` : ''}
    </div>
  </div>`;
  document.getElementById('app').innerHTML = hd + (
    st.view === 'login'    ? renderLogin()    :
    st.view === 'eval'     ? renderEval()     :
    st.view === 'floormap' ? renderFloorMap() :
    renderResults()
  );
}

function showSpinner(msg) {
  document.getElementById('app').innerHTML =
    `<div class="loading"><div class="spinner"></div><span>${msg||'読み込み中...'}</span></div>`;
}

// ================================================================
// LOGIN
// ================================================================
function renderLogin() {
  const q = isQ();
  const memberSec = q
    ? `<div class="card"><div class="qban">⚠️ 今月（${MN[st.m]}）は第三者評価月のため、メンバー個人の評価入力はできません。</div>
       <p style="font-size:.86rem;color:var(--muted)">事務所管理者・5Sリーダーのみ評価可能です。</p></div>`
    : `<div class="card">
        <h2>👤 メンバー（個人評価）</h2>
        <p style="font-size:.82rem;color:var(--muted);margin-bottom:4px">自分の名前を選んでください</p>
        <div class="ngrid">
          ${st.cfg.members.map(m=>`<button class="nbtn ${st.cfg.s2members.includes(m)?'s2':''}\" onclick="loginMember('${m}')">${m}${st.cfg.s2members.includes(m)?'*':''}</button>`).join('')}
        </div>
        <p style="font-size:.75rem;color:var(--muted);margin-top:4px">* 共通エリアも担当</p>
       </div>`;
  return memberSec + `<div class="card">
    <h2>🔐 管理者・5Sリーダー（第三者評価月専用）</h2>
    <div class="ngrid">${st.cfg.admins.map(p=>`<button class="nbtn priv" onclick="selectPriv('${p}',this)">${p}</button>`).join('')}</div>
    <div class="al al-i" style="margin-top:10px">名前を選んでPINコードを入力してください</div>
    <div class="pin-wrap">
      <input type="password" id="pin" placeholder="PINコード" onkeydown="if(event.key==='Enter')loginPriv()">
      <button class="btn btn-p" onclick="loginPriv()">ログイン</button>
    </div>
    <div id="pin-err" style="color:var(--ng);font-size:.82rem;margin-top:5px"></div>
  </div>`;
}

async function loginMember(name) {
  showSpinner('読み込み中...');
  try {
    const d = await apiGet({ action: 'getMemberData', year: st.y, month: st.m, name });
    st.memberData[name] = d;
    // s2membersは共通エリアのデータも取得
    const role = st.cfg.s2members.includes(name) ? 's2member' : 'member';
    if (role === 's2member') {
      const cd = await apiGet({ action: 'getMemberData', year: st.y, month: st.m, name: '__common__' });
      st.memberData['__common__'] = cd;
    }
    st.user = name; st.role = role; st.view = 'eval';
    render();
  } catch(e) { alert('読み込みに失敗しました: ' + e.message); render(); }
}

function selectPriv(name, el) {
  _selPrivName = name;
  document.querySelectorAll('.nbtn.priv').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
  setTimeout(() => { const p = document.getElementById('pin'); if(p) p.focus(); }, 50);
}

async function loginPriv() {
  const errEl = document.getElementById('pin-err');
  if (!_selPrivName) { errEl.textContent = '名前を選んでください'; return; }
  const pin = document.getElementById('pin').value;
  try {
    const res = await apiGet({ action: 'authenticate', name: _selPrivName, pin });
    if (res.role === 'priv') {
      showSpinner('読み込み中...');
      st.user = _selPrivName; st.role = 'priv';
      await loadAllData();
      st.view = 'eval'; render();
    } else {
      document.getElementById('pin-err').textContent = 'PINコードが違います';
    }
  } catch(e) { errEl.textContent = 'エラー: ' + e.message; }
}

function logout() {
  st.user = null; st.role = null; st.view = 'login';
  st.memberData = {}; st.results = null; _selPrivName = null;
  render();
}

async function loadAllData() {
  const r = await apiGet({ action: 'getResults', year: st.y, month: st.m });
  st.results = r;
  st.cfg.members.forEach(m => {
    st.memberData[m] = r[m] || { s1:Array(10).fill(null), s2:Array(10).fill(null), submitted:false, submittedAt:null };
  });
  st.memberData['__common__'] = r['__common__'] || { s1:Array(10).fill(null), s2:Array(10).fill(null), submitted:false, submittedAt:null };
}

// ================================================================
// EVAL
// ================================================================
function renderEval() {
  const nav = `<div class="nav">
    <button class="nbtn2 on">📝 評価入力</button>
    <button class="nbtn2" onclick="switchResults()">📊 結果一覧</button>
    <button class="nbtn2" onclick="switchFloorMap()">🗺️ フロアマップ</button>
  </div>`;
  if (st.role === 'priv')     return nav + renderPrivEval();
  if (st.role === 's2member') return nav + renderS2MemberEval();
  return nav + renderMemberEval();
}

async function switchResults() {
  showSpinner('結果を取得中...');
  st.results = await apiGet({ action: 'getResults', year: st.y, month: st.m });
  st.view = 'results'; render();
}

async function switchFloorMap() {
  showSpinner('読み込み中...');
  if (!st.results) {
    st.results = await apiGet({ action: 'getResults', year: st.y, month: st.m });
  }
  st.view = 'floormap'; render();
}

function renderMemberEval() {
  const md = st.memberData[st.user];
  if (!md) return '<div class="loading"><div class="spinner"></div></div>';
  if (md.submitted) return `<div class="card sv">
    <div class="ico">✅</div><h2>提出完了</h2>
    <p>${md.submittedAt} に提出しました</p>
    ${roScores(S1, md.s1)}
    <div class="tbar"><span>合計点</span><span class="tscore">${sum(md.s1)} / 100点</span></div>
    <p style="font-size:.8rem;color:var(--muted)">提出後の編集はできません。</p>
  </div>`;
  return `<div class="card">
    <h2>📋 ${st.user} さんの評価入力</h2>
    <div class="al al-i">○(10点) △(5点) ×(0点) で評価し、提出してください。提出後は変更不可です。</div>
    <div class="sec-ttl">第1部：個人エリア評価（机周り・床面）</div>
    ${scoreForm(S1, md.s1, false)}
    <div class="tbar"><span>合計点</span><span class="tscore">${sum(md.s1)} / 100点</span></div>
    <div style="text-align:right;margin-top:10px">
      <button class="btn btn-s" onclick="submitMember()">✓ 提出する（変更不可）</button>
    </div>
  </div>`;
}

function renderS2MemberEval() {
  const name = st.user;
  const md = st.memberData[name] || { s1:Array(10).fill(null), submitted:false };
  const cmd = st.memberData['__common__'] || { s2:Array(10).fill(null), submitted:false };

  const s1html = md.submitted
    ? `<div class="al al-s">✅ 提出済み（${md.submittedAt}）</div>${roScores(S1,md.s1)}
       <div class="tbar"><span>合計</span><span class="tscore">${sum(md.s1)}/100点</span></div>`
    : `${scoreForm(S1, md.s1, false, name, 's1')}
       <div class="tbar"><span>合計点</span><span class="tscore">${sum(md.s1)}/100点</span></div>
       <div style="text-align:right;margin-top:10px">
         <button class="btn btn-s" onclick="submitMember()">✓ 個人エリアを提出（変更不可）</button>
       </div>`;

  const s2html = cmd.submitted
    ? `<div class="al al-s">✅ 提出済み（${cmd.submittedAt}）</div>${roScores(S2,cmd.s2)}
       <div class="tbar"><span>合計</span><span class="tscore">${sum(cmd.s2)}/100点</span></div>`
    : `${scoreForm(S2, cmd.s2, false, '__common__', 's2')}
       <div class="tbar"><span>合計点</span><span class="tscore">${sum(cmd.s2)}/100点</span></div>
       <div style="text-align:right;margin-top:10px">
         <button class="btn btn-s" onclick="submitCommon()">✓ 共通エリアを提出（変更不可）</button>
       </div>`;

  return `<div class="card">
    <h2>📋 ${name} さんの評価入力</h2>
    <div class="al al-i">個人エリアと共通エリアの両方を評価してください。各提出後は変更不可です。</div>
    <div class="sec-ttl">第1部：個人エリア評価（机周り・床面）</div>
    ${s1html}
  </div>
  <div class="card">
    <h2>🏢 共通エリア評価</h2>
    <div class="sec-ttl">第2部：棚・壁柱・防火防災</div>
    ${s2html}
  </div>`;
}

function renderPrivEval() {
  const q = isQ();
  const tabs = st.cfg.members.map(m => {
    const done = st.memberData[m] && st.memberData[m].submitted;
    return `<button class="mtab ${st.selMember===m?'on':''} ${done?'done':''}" onclick="st.selMember='${m}';render()">${m}${done?' ✓':''}</button>`;
  }).join('');
  const md = st.memberData[st.selMember] || { s1:Array(10).fill(null), s2:Array(10).fill(null), submitted:false };
  const s1html = md.submitted
    ? `<div class="al al-s">✅ ${st.selMember}：提出済み（${md.submittedAt}）</div>${roScores(S1,md.s1)}<div class="tbar"><span>合計</span><span class="tscore">${sum(md.s1)}/100点</span></div>`
    : `${scoreForm(S1, md.s1, false, st.selMember, 's1')}
       <div class="tbar"><span>合計点</span><span class="tscore">${sum(md.s1)}/100点</span></div>
       <div style="display:flex;gap:7px;justify-content:flex-end;margin-top:9px">
         <button class="btn btn-p btn-sm" onclick="saveDraft('${st.selMember}')">一時保存</button>
         <button class="btn btn-s btn-sm" onclick="submitAdmin('${st.selMember}')">✓ ${st.selMember}を確定</button>
       </div>`;
  const cmd = st.memberData['__common__'] || { s2:Array(10).fill(null), submitted:false };
  const s2html = cmd.submitted
    ? `<div class="al al-s">✅ 共通エリア：提出済み（${cmd.submittedAt}）</div>${roScores(S2,cmd.s2)}<div class="tbar"><span>合計</span><span class="tscore">${sum(cmd.s2)}/100点</span></div>`
    : `${scoreForm(S2, cmd.s2, false, '__common__', 's2')}
       <div class="tbar"><span>合計点</span><span class="tscore">${sum(cmd.s2)}/100点</span></div>
       <div style="text-align:right;margin-top:9px">
         <button class="btn btn-s btn-sm" onclick="submitCommon()">✓ 共通エリアを確定</button>
       </div>`;
  return `<div class="card">
    <h2>👤 メンバー個人評価${q?' （第三者評価）':''}</h2>
    ${q?`<div class="qban">⚠️ 第三者評価月：管理者・リーダーが全メンバーを評価します</div>`:''}
    <div class="mtabs">${tabs}</div>
    <div class="sec-ttl">第1部：個人エリア評価 — ${st.selMember} さん</div>
    ${s1html}
  </div>
  <div class="card"><h2>🏢 共通エリア評価</h2>
    <div class="sec-ttl">第2部：棚・壁柱・防火防災</div>${s2html}
  </div>`;
}

function scoreForm(items, scores, ro, key, sec) {
  let h='', la=null;
  items.forEach((it,i) => {
    if(it.a!==la){h+=`<div class="area-lbl">📍 ${it.a}</div>`;la=it.a;}
    const s=scores[i];
    const setFn = key ? `setScore('${key}','${sec||'s1'}',${i},` : `setScore('${st.user}','s1',${i},`;
    h+=`<div class="ci">
      <div class="ci-no">${it.n}</div><div class="ci-txt">${it.t}</div>
      <div class="sg">
        <button class="sb ok ${s===10?'on':''}" ${ro?'disabled':''} onclick="${setFn}10)">○</button>
        <button class="sb wr ${s===5?'on':''}"  ${ro?'disabled':''} onclick="${setFn}5)">△</button>
        <button class="sb ng ${s===0?'on':''}"  ${ro?'disabled':''} onclick="${setFn}0)">×</button>
      </div></div>`;
  });
  return h;
}

function roScores(items, scores) {
  const col={10:'var(--ok)',5:'var(--warn)',0:'var(--ng)'};
  let h='', la=null;
  items.forEach((it,i) => {
    if(it.a!==la){h+=`<div class="area-lbl">📍 ${it.a}</div>`;la=it.a;}
    const s=scores[i], lbl=s===10?'○':s===5?'△':s===0?'×':'－';
    h+=`<div class="ci"><div class="ci-no">${it.n}</div><div class="ci-txt">${it.t}</div>
      <div style="font-size:1.05rem;font-weight:700;color:${col[s]||'var(--muted)'};width:40px;text-align:center">${lbl}</div>
      <div style="font-weight:700;color:${col[s]||'var(--muted)'};width:30px;text-align:right">${s!=null?s+'点':'－'}</div>
    </div>`;
  });
  return h;
}

function setScore(key, sec, idx, val) {
  if(!st.memberData[key]) st.memberData[key]={s1:Array(10).fill(null),s2:Array(10).fill(null),submitted:false};
  if(st.memberData[key].submitted) return;
  st.memberData[key][sec][idx]=val;
  render();
}

// ================================================================
// Submit
// ================================================================
async function submitMember() {
  const md = st.memberData[st.user];
  const ua = md.s1.filter(s=>s===null).length;
  if(ua>0 && !confirm(`${ua}項目が未評価です。未評価は0点として提出しますか？`)) return;
  if(!confirm('提出すると編集できなくなります。よろしいですか？')) return;
  md.s1 = md.s1.map(s=>s===null?0:s);
  try {
    const res = await apiGet({action:'submitScores',year:st.y,month:st.m,name:st.user,
      s1:JSON.stringify(md.s1),s2:JSON.stringify(md.s2),role:'member'});
    if(res.success){ md.submitted=true; md.submittedAt=res.submittedAt; render(); }
    else alert(res.message);
  } catch(e){ alert('通信エラー: '+e.message); }
}

async function submitAdmin(name) {
  const md = st.memberData[name] || {s1:Array(10).fill(null),s2:Array(10).fill(null)};
  const ua = md.s1.filter(s=>s===null).length;
  if(ua>0 && !confirm(`${ua}項目未評価。このまま確定しますか？`)) return;
  if(!confirm(`${name}さんの評価を確定します。よろしいですか？`)) return;
  md.s1 = md.s1.map(s=>s===null?0:s);
  try {
    const res = await apiGet({action:'submitScores',year:st.y,month:st.m,name,
      s1:JSON.stringify(md.s1),s2:JSON.stringify(md.s2),role:'priv'});
    if(res.success){
      md.submitted=true; md.submittedAt=res.submittedAt;
      const next=st.cfg.members.find(m=>!(st.memberData[m]&&st.memberData[m].submitted));
      if(next) st.selMember=next;
      render();
    } else alert(res.message);
  } catch(e){ alert('通信エラー: '+e.message); }
}

async function saveDraft(name) {
  const md = st.memberData[name] || {s1:Array(10).fill(null),s2:Array(10).fill(null)};
  try {
    await apiGet({action:'saveScores',year:st.y,month:st.m,name,
      s1:JSON.stringify(md.s1),s2:JSON.stringify(md.s2),role:'priv'});
    const el=document.querySelector('.btn-p.btn-sm');
    if(el){el.textContent='保存済み ✓';setTimeout(()=>{el.textContent='一時保存';},2000);}
  } catch(e){ alert('保存失敗: '+e.message); }
}

async function submitCommon() {
  const md = st.memberData['__common__'] || {s2:Array(10).fill(null)};
  const ua = md.s2.filter(s=>s===null).length;
  if(ua>0 && !confirm(`${ua}項目未評価。このまま提出しますか？`)) return;
  if(!confirm('共通エリア評価を確定します。よろしいですか？')) return;
  md.s2 = md.s2.map(s=>s===null?0:s);
  try {
    const res = await apiGet({action:'submitScores',year:st.y,month:st.m,name:'__common__',
      s1:JSON.stringify(Array(10).fill(null)),s2:JSON.stringify(md.s2),role:'priv'});
    if(res.success){ md.submitted=true; md.submittedAt=res.submittedAt; render(); }
    else alert(res.message);
  } catch(e){ alert('通信エラー: '+e.message); }
}

// FLOOR MAP

function renderFloorMap() {
  const nav = `<div class="nav">
    <button class="nbtn2" onclick="st.view='eval';render()">📝 評価入力</button>
    <button class="nbtn2" onclick="st.view='results';render()">📊 結果一覧</button>
    <button class="nbtn2 on">🗺️ フロアマップ</button>
  </div>`;

  const d = st.results || {};
  const s1scores = {};
  (st.cfg.members || []).forEach(m => {
    const md = d[m];
    s1scores[m] = (md && md.submitted) ? sum(md.s1) : null;
  });
  const cmd = d['__common__'];
  const s2score = (cmd && cmd.submitted) ? sum(cmd.s2) : null;

  // SVGオーバーレイのrectを生成
  const rects = AREAS.map(a => {
    const score = a.s2 ? s2score : s1scores[a.key];
    const fill  = areaColor(score);
    const cx = a.x + a.w / 2;
    const cy = a.y + a.h / 2;
    const label = score != null ? `${a.key} ${score}` : a.key;
    // テキストを2行に分ける（名前 / スコア）
    const namePart  = a.key;
    const scorePart = score != null ? `${score}点` : '未';
    const fs = Math.min(a.w, a.h) * 0.18;  // フォントサイズ
    const fs2 = fs * 0.85;
    return `
      <rect x="${a.x}" y="${a.y}" width="${a.w}" height="${a.h}" fill="${fill}" rx="3"/>
      <text x="${cx}" y="${cy - fs*0.4}" text-anchor="middle" dominant-baseline="middle"
        font-size="${fs}" font-weight="bold" fill="#1e293b" font-family="'Hiragino Sans','Meiryo',sans-serif"
        style="pointer-events:none">${namePart}</text>
      <text x="${cx}" y="${cy + fs*1.0}" text-anchor="middle" dominant-baseline="middle"
        font-size="${fs2}" font-weight="bold" fill="#1e293b" font-family="'Hiragino Sans','Meiryo',sans-serif"
        style="pointer-events:none">${scorePart}</text>`;
  }).join('');

  // 凡例
  const legend = [
    { label:'91〜100点', color:'rgba(0,176,80,0.7)' },
    { label:'81〜90点',  color:'rgba(146,208,80,0.7)' },
    { label:'71〜80点',  color:'rgba(255,255,0,0.8)' },
    { label:'61〜70点',  color:'rgba(197,90,17,0.7)' },
    { label:'0〜60点',   color:'rgba(255,0,0,0.7)' },
    { label:'未提出',    color:'rgba(180,180,180,0.3)' },
  ].map(l => `<div style="display:flex;align-items:center;gap:6px;font-size:.8rem">
    <div style="width:28px;height:16px;background:${l.color};border:1px solid #ccc;border-radius:3px;flex-shrink:0"></div>
    <span>${l.label}</span>
  </div>`).join('');

  return nav + `<div class="card">
    <h2>🗺️ フロアマップ</h2>
    ${monthSelectorHtml()}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px">
      <span style="font-weight:700;color:var(--brand)">${st.y}年${MN[st.m]}</span>
      <button class="btn btn-p btn-sm" onclick="changeResultMonth(${st.y},${st.m}).then(()=>{st.view='floormap';render()})">🔄 更新</button>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">${legend}</div>
    <div style="position:relative;width:100%;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:#fff">
      <img src="floorplan.png" style="width:100%;display:block" onerror="this.style.display='none';document.getElementById('fp-err').style.display='block'">
      <div id="fp-err" style="display:none;padding:20px;text-align:center;color:var(--muted);font-size:.88rem">
        ⚠️ floorplan.png が見つかりません。5Sアプリフォルダに画像を追加してGitHubにpushしてください。
      </div>
      <svg style="position:absolute;top:0;left:0;width:100%;height:100%"
           viewBox="0 0 1415 715" preserveAspectRatio="none">
        ${rects}
      </svg>
    </div>
  </div>`;
}

function monthSelectorHtml() {
  const now = new Date();
  const cy = now.getFullYear();
  const years = [cy-1, cy];
  let html = `<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px">
    <span style="font-size:.8rem;color:var(--muted)">年度：</span>
    ${years.map(y=>`<button class="mtab ${st.y===y?'on':''}" onclick="changeResultMonth(${y},${st.m})">${y}年</button>`).join('')}
    <span style="font-size:.8rem;color:var(--muted);margin-left:6px">月：</span>
    ${Array.from({length:12},(_,i)=>{const m=i+1;return `<button class="mtab ${st.m===m&&st.y===st.y?'on':''}" onclick="changeResultMonth(${st.y},${m})">${m}月</button>`;}).join('')}
  </div>`;
  return html;
}

function renderResults() {
  const nav=`<div class="nav">
    <button class="nbtn2" onclick="st.view='eval';render()">📝 評価入力</button>
    <button class="nbtn2 on">📊 結果一覧</button>
    <button class="nbtn2" onclick="switchFloorMap()">🗺️ フロアマップ</button>
  </div>`;
  const d=st.results||{}, members=st.cfg.members;
  const cmd=d['__common__']||{s2:Array(10).fill(null),submitted:false};
  const totals=members.map(()=>0);
  let tb1='',la=null;
  S1.forEach((it,i)=>{
    tb1+='<tr>';
    if(it.a!==la){tb1+=`<td class="arc" rowspan="${S1.filter(x=>x.a===it.a).length}">${it.a}</td>`;la=it.a;}
    tb1+=`<td>${it.n}</td><td class="itl">${it.t}</td>`;
    members.forEach((m,mi)=>{const md=d[m];const s=md?md.s1[i]:null;totals[mi]+=(s||0);tb1+=`<td class="${scCls(s)}">${s===null?'－':s===10?'○':s===5?'△':'×'}</td>`;});
    tb1+='</tr>';
  });
  tb1+='<tr><td colspan="3" style="font-weight:700;text-align:right;padding-right:7px">合計</td>';
  members.forEach((m,mi)=>{const md=d[m];const ok=md&&md.submitted;tb1+=`<td class="${ok?totCls(totals[mi]):'cna'}">${ok?totals[mi]:'未'}</td>`;});
  tb1+='</tr>';
  let tb2='',la2=null,s2tot=0;
  S2.forEach((it,i)=>{
    tb2+='<tr>';
    if(it.a!==la2){tb2+=`<td class="arc" rowspan="${S2.filter(x=>x.a===it.a).length}">${it.a}</td>`;la2=it.a;}
    const s=cmd.s2?cmd.s2[i]:null;s2tot+=(s||0);
    tb2+=`<td>${it.n}</td><td class="itl">${it.t}</td><td class="${scCls(s)}">${s===null?'－':s===10?'○':s===5?'△':'×'}</td></tr>`;
  });
  tb2+=`<tr><td colspan="3" style="font-weight:700;text-align:right;padding-right:7px">合計</td><td class="${cmd.submitted?totCls(s2tot):'cna'}">${cmd.submitted?s2tot:'未'}</td></tr>`;
  const submitted=members.filter(m=>d[m]&&d[m].submitted).length;
  const thM=members.map(m=>`<th>${m}</th>`).join('');
  return nav+`<div class="card">
    <h2>📊 評価結果一覧</h2>
    ${monthSelectorHtml()}
    <div style="font-weight:700;margin-bottom:8px;color:var(--brand)">${st.y}年${MN[st.m]}</div>
    <div class="al al-i" style="margin-bottom:10px">提出状況：<b>${submitted} / ${members.length} 名</b>完了</div>
    <h3 style="font-size:.88rem;margin:8px 0 6px;color:var(--brand)">▶ 第1部：個人エリア評価</h3>
    <div class="rtw"><table class="rt">
      <thead><tr><th class="ar">場所</th><th>№</th><th class="ar" style="text-align:left;padding-left:5px">チェック項目</th>${thM}</tr></thead>
      <tbody>${tb1}</tbody></table></div>
    <h3 style="font-size:.88rem;margin:16px 0 6px;color:var(--brand)">▶ 第2部：共通エリア評価</h3>
    <div class="rtw"><table class="rt">
      <thead><tr><th class="ar">場所</th><th>№</th><th class="ar" style="text-align:left;padding-left:5px">チェック項目</th><th>評価</th></tr></thead>
      <tbody>${tb2}</tbody></table></div>
    <div style="margin-top:12px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <button class="btn btn-p btn-sm" onclick="refreshResults()">🔄 最新に更新</button>
      <button class="btn btn-p btn-sm" onclick="exportCSV()">📥 CSVダウンロード</button>
    </div>
  </div>`;
}

async function refreshResults() {
  showSpinner('更新中...');
  st.results = await apiGet({action:'getResults',year:st.y,month:st.m});
  st.view='results'; render();
}

async function changeResultMonth(y, m) {
  st.y = y; st.m = m; st.results = null;
  showSpinner('読み込み中...');
  st.results = await apiGet({action:'getResults',year:y,month:m});
  render();
}

function exportCSV() {
  const d=st.results||{}, members=st.cfg.members;
  let csv='氏名,'+S1.map(i=>`${i.n}）${i.t}`).join(',')+',合計(個人)\n';
  members.forEach(m=>{const md=d[m]||{s1:Array(10).fill('')};csv+=`${m},${md.s1.map(s=>s!=null?s:'').join(',')},${md.submitted?sum(md.s1):''}\n`;});
  csv+='\n共通エリア,'+S2.map(i=>`${i.n}）${i.t}`).join(',')+',合計(共通)\n';
  const cm=d['__common__']||{s2:Array(10).fill('')};
  csv+=`評価結果,${cm.s2.map(s=>s!=null?s:'').join(',')},${cm.submitted?sum(cm.s2):''}\n`;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv'}));
  a.download=`5S評価_${st.y}年${st.m}月.csv`;a.click();
}

init();
</script>
